<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{color-scheme:dark}
  body{margin:0;background:#0b0f17;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
       background-image:radial-gradient(40rem 40rem at 90% -10%,rgba(59,130,246,.08),transparent),radial-gradient(40rem 40rem at -10% 110%,rgba(245,158,11,.06),transparent);
       background-attachment:fixed;min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  .wrap{max-width:720px;margin:0 auto;padding:24px 16px 48px}
  h1{font-size:26px;font-weight:600;letter-spacing:-.02em;text-align:center;margin:8px 0 2px}
  h1 span{color:#3b82f6}
  .sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:22px}
  .searchrow{display:flex;gap:8px;max-width:440px;margin:0 auto}
  #ticker{flex:1;background:#121826;border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:13px 16px;color:#e2e8f0;font-size:16px;letter-spacing:.05em;text-transform:uppercase}
  #ticker:focus{outline:none;border-color:rgba(59,130,246,.6);box-shadow:0 0 0 3px rgba(59,130,246,.18)}
  #go{background:#3b82f6;border:none;border-radius:11px;color:#fff;font-weight:600;padding:0 20px;font-size:15px;cursor:pointer}
  #go:active{transform:scale(.98)}#go:disabled{opacity:.45}
  .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:11px}
  .chip{background:#121826;border:1px solid rgba(255,255,255,.12);color:#94a3b8;font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer}
  .chip:active{transform:scale(.97)}
  .lb{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}
  .lb small{font-size:10px;letter-spacing:.18em;color:#64748b;text-transform:uppercase}
  .lbg{display:inline-flex;background:#121826;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:3px}
  .lbg button{background:transparent;border:none;color:#94a3b8;font-size:13px;padding:6px 13px;border-radius:7px;cursor:pointer}
  .lbg button.on{background:#3b82f6;color:#fff}
  #body{margin-top:20px;display:grid;gap:14px}
  .card{background:#121826;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px}
  .card.kezc{border-color:rgba(245,158,11,.28)}
  .kez{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#f59e0b;font-size:11px;letter-spacing:.16em;font-weight:600;text-transform:uppercase}
  .badge{font-size:9.5px;font-weight:600;letter-spacing:.08em;padding:3px 8px;border-radius:7px;white-space:nowrap}
  .poc{font-size:40px;font-weight:600;letter-spacing:-.02em;color:#fff;margin-top:3px}
  .divider{height:1px;background:rgba(255,255,255,.1);margin:14px 0}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;gap:6px}
  .stats .l{font-size:9px;letter-spacing:.08em;color:#64748b;text-transform:uppercase}
  .stats .v{font-size:14px;font-weight:600;margin-top:3px}
  .ctitle{font-size:13px;font-weight:600;color:#e2e8f0}
  .csub{font-size:10px;color:#64748b;margin:2px 0 12px}
  .row{display:flex;align-items:center;gap:7px;height:14px}
  .row .pl{width:58px;text-align:right;font-size:10px;font-variant-numeric:tabular-nums}
  .track{flex:1;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;position:relative}
  .fill{height:10px;border-radius:0 3px 3px 0}
  .tag{font-size:8.5px;font-weight:600;width:30px;text-align:left}
  .legend{display:flex;flex-wrap:wrap;justify-content:center;gap:13px;margin-top:14px;font-size:10px;color:#94a3b8}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:10px;height:10px;border-radius:2px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .metric{background:#0e1420;border-radius:11px;padding:10px 12px}
  .metric .l{font-size:9px;letter-spacing:.06em;color:#64748b;text-transform:uppercase}
  .metric .v{font-size:15px;font-weight:600;margin-top:3px}
  .ind{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .pill{font-size:11px;font-weight:600;padding:5px 10px;border-radius:9px;background:#0e1420;border:1px solid rgba(255,255,255,.08)}
  .rng{position:relative;height:8px;border-radius:5px;background:linear-gradient(90deg,#1e3a5f,#3b82f6);margin:10px 0 4px}
  .rngmark{position:absolute;top:-4px;width:3px;height:16px;background:#fff;border-radius:2px}
  .newsitem{display:block;padding:10px 0;border-top:1px solid rgba(255,255,255,.07);text-decoration:none;color:inherit}
  .newsitem:first-child{border-top:none}
  .newshead{font-size:13px;color:#e2e8f0;line-height:1.4}
  .newsmeta{font-size:10px;color:#64748b;margin-top:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .msg{text-align:center;padding:36px 16px;color:#94a3b8}
  .spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.15);border-top-color:#3b82f6;border-radius:50%;margin:0 auto 12px;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .err{color:#fca5a5;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:14px;padding:14px 16px;text-align:center;font-size:14px}
  .softerr{font-size:11px;color:#64748b;padding:6px 0}
  .loadbtn{margin-top:10px;background:#0e1420;border:1px solid rgba(59,130,246,.4);color:#93c5fd;font-size:12px;font-weight:600;padding:9px 14px;border-radius:10px;cursor:pointer}
  .loadbtn:active{transform:scale(.98)}
  .stale{font-size:10px;color:#fbbf24;margin-top:6px}
  footer{text-align:center;font-size:11px;color:#475569;margin-top:28px;line-height:1.6}
  footer a{color:#64748b}
  svg{display:block;width:100%;height:auto}
</style>

<body>
<div class="wrap">
  <h1>Volume <span>Profile</span></h1>
  <div class="sub">Find high-volume nodes, key entry zones &amp; confluence for US stocks.</div>

  <div class="searchrow">
    <input id="ticker" value="AAPL" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="AAPL, TSLA, NVDA…" />
    <button id="go">Analyze</button>
  </div>
  <div class="chips" id="chips"></div>

  <div class="lb">
    <small>Lookback</small>
    <div class="lbg" id="lbg">
      <button data-d="30">30d</button>
      <button data-d="60" class="on">60d</button>
      <button data-d="90">90d</button>
    </div>
  </div>

  <div id="body"></div>

  <footer>
    Educational tool · not investment advice · data via
    <a href="https://twelvedata.com" target="_blank" rel="noopener">Twelve Data</a><br>
    Source: <a href="https://github.com/salharb1/stocks-volume-profile" target="_blank" rel="noopener">github.com/salharb1/stocks-volume-profile</a>
  </footer>
</div>

<script>
(function(){
  var TD_KEY='82c27d713c5b40dcadd2d5f46ccf6d7a';      // Twelve Data — primary, 800/day free
  var AV_KEYS=['X1INE4BY0VFOR5CX','7HBKTU2HEREW4NB8']; // Alpha Vantage — fallback for prices
  var POC='#f59e0b', VA='#3b82f6', OUT='#1e3a5f', HVN='#2dd4bf', LVN='#64748b';
  var state={lookback:60, symbol:null};
  var cache={};
  var body=document.getElementById('body');

  // ---------- on-device cache ----------
  function lsGet(key,maxAge){try{var r=localStorage.getItem(key);if(!r)return null;var o=JSON.parse(r);if(maxAge&&Date.now()-o.t>maxAge)return null;return o.d;}catch(e){return null;}}
  function lsSet(key,data){try{localStorage.setItem(key,JSON.stringify({t:Date.now(),d:data}));}catch(e){}}
  var DAY=864e5;

  ['AAPL','TSLA','NVDA','MSFT','AMZN','META'].forEach(function(s){
    var b=document.createElement('button'); b.className='chip'; b.textContent=s;
    b.onclick=function(){document.getElementById('ticker').value=s; analyze();};
    document.getElementById('chips').appendChild(b);
  });

  function usd(v){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(v);}
  function num(v){return new Intl.NumberFormat('en-US').format(v);}
  function cap(v){v=+v;if(!isFinite(v)||v<=0)return '—';if(v>=1e12)return '$'+(v/1e12).toFixed(2)+'T';if(v>=1e9)return '$'+(v/1e9).toFixed(2)+'B';if(v>=1e6)return '$'+(v/1e6).toFixed(1)+'M';return '$'+num(v);}

  // ---------- volume profile ----------
  function buildProfile(candles, lookback, binCount, vaPct){
    binCount=binCount||24; vaPct=vaPct||0.7;
    var w=candles.slice(-lookback); if(w.length<2)return null;
    var lo=Math.min.apply(null,w.map(function(c){return c.low;})), hi=Math.max.apply(null,w.map(function(c){return c.high;}));
    if(!(hi>lo))return null;
    var bw=(hi-lo)/binCount, bins=[];
    for(var i=0;i<binCount;i++){var l=lo+i*bw;bins.push({lower:l,upper:l+bw,mid:l+bw/2,volume:0});}
    w.forEach(function(c){var dL=c.low,dH=Math.max(c.high,c.low+1e-6),sp=dH-dL;bins.forEach(function(b){var ov=Math.min(dH,b.upper)-Math.max(dL,b.lower);if(ov>0)b.volume+=c.volume*(ov/sp);});});
    var poc=bins.reduce(function(a,b){return b.volume>a.volume?b:a;},bins[0]);
    var total=bins.reduce(function(s,b){return s+b.volume;},0),pi=bins.indexOf(poc),low=pi,up=pi,acc=bins[pi].volume,target=total*vaPct;
    while(acc<target&&(low>0||up<bins.length-1)){var bv=low>0?bins[low-1].volume:-1,av=up<bins.length-1?bins[up+1].volume:-1;if(av>=bv){up++;acc+=bins[up].volume;}else{low--;acc+=bins[low].volume;}}
    var mean=total/bins.length;
    bins.forEach(function(b,i){
      var pv=i>0?bins[i-1].volume:-1, nv=i<bins.length-1?bins[i+1].volume:-1;
      b.isHVN = b!==poc && b.volume>=pv && b.volume>=nv && b.volume>mean*1.12;
      b.isLVN = b.volume<=pv && b.volume<=nv && b.volume<mean*0.6;
    });
    return {bins:bins,poc:poc,vaLow:bins[low].lower,vaHigh:bins[up].upper,priceLow:lo,priceHigh:hi,
            lastClose:w[w.length-1].close,periodDays:w.length,window:w,maxVol:Math.max.apply(null,bins.map(function(b){return b.volume;}))};
  }

  // ---------- indicators (computed locally) ----------
  function sma(closes,p){if(closes.length<p)return null;var s=0;for(var i=closes.length-p;i<closes.length;i++)s+=closes[i];return s/p;}
  function rsi(closes,p){p=p||14;if(closes.length<p+1)return null;var g=0,l=0;for(var i=closes.length-p;i<closes.length;i++){var ch=closes[i]-closes[i-1];if(ch>=0)g+=ch;else l-=ch;}var ag=g/p,al=l/p;if(al===0)return 100;return 100-100/(1+ag/al);}
  function atr(w,p){p=p||14;if(w.length<p+1)return null;var trs=[];for(var i=1;i<w.length;i++){var t=Math.max(w[i].high-w[i].low,Math.abs(w[i].high-w[i-1].close),Math.abs(w[i].low-w[i-1].close));trs.push(t);}var last=trs.slice(-p);return last.reduce(function(a,b){return a+b;},0)/p;}

  // ---------- parsing ----------
  function parseSeries(json){
    if(json.Note||json.Information) throw {msg:'API rate limit reached (free tier: 25/day, 5/min). Wait a minute and retry.'};
    if(json['Error Message']) throw {msg:'Couldn’t find that ticker. Check the symbol.'};
    var s=json['Time Series (Daily)']; if(!s) throw {msg:'No price data returned for this symbol.'};
    var c=Object.keys(s).map(function(d){var r=s[d];return {date:d,low:+r['3. low'],high:+r['2. high'],close:+r['4. close'],volume:+r['5. volume']};})
      .filter(function(x){return isFinite(x.close)&&isFinite(x.volume);}).sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    if(!c.length) throw {msg:'No price data returned for this symbol.'};
    return c;
  }

  // ---------- network ----------
  // Twelve Data (primary). Errors arrive in-body as {status:'error',code,message}.
  function tdGet(path,params){
    return fetch('https://api.twelvedata.com/'+path+'?'+params+'&apikey='+TD_KEY).then(function(r){return r.json();}).then(function(j){
      if(j&&j.status==='error') throw {msg:j.message||'error',rl:j.code===429,bad:j.code===400||j.code===404};
      return j;
    });
  }
  // Alpha Vantage (fallback for prices). Rotates across keys.
  function q(fn,extra,key){return 'https://www.alphavantage.co/query?function='+fn+'&apikey='+key+(extra||'');}
  function avFetch(fn,extra){
    var i=0;
    function attempt(){
      return fetch(q(fn,extra,AV_KEYS[i])).then(function(r){
        if(r.status===429) return advance();
        if(!r.ok) throw {msg:'http'};
        return r.json().then(function(j){ if(j&&(j.Note||j.Information)) return advance(); return j; });
      });
    }
    function advance(){ i++; if(i<AV_KEYS.length) return attempt(); throw {msg:'rate',rl:true}; }
    return attempt();
  }
  // Daily candles: Twelve Data first, Alpha Vantage on failure. Ascending [{date,low,high,close,volume}].
  function parseTD(j){
    var v=j&&j.values; if(!v||!v.length) throw {msg:'No price data for this symbol.'};
    return v.map(function(r){return {date:r.datetime,low:+r.low,high:+r.high,close:+r.close,volume:+r.volume};})
      .filter(function(x){return isFinite(x.close)&&isFinite(x.volume);}).reverse();
  }
  function fetchCandles(sym){
    return tdGet('time_series','symbol='+encodeURIComponent(sym)+'&interval=1day&outputsize=300').then(parseTD)
      .catch(function(e){ if(e&&e.bad) throw {msg:'Couldn’t find that ticker. Check the symbol.'};
        return avFetch('TIME_SERIES_DAILY','&symbol='+encodeURIComponent(sym)+'&outputsize=compact').then(parseSeries); });
  }

  function analyze(){
    var sym=(document.getElementById('ticker').value||'').trim().toUpperCase().replace(/[^A-Z.\-]/g,'');
    if(!sym)return;
    document.getElementById('ticker').value=sym; state.symbol=sym; state.stale=false;
    document.getElementById('go').disabled=true;

    if(cache[sym]&&cache[sym].daily){renderAll();document.getElementById('go').disabled=false;return;}
    var fresh=lsGet('vp:daily:'+sym, 0.5*DAY);
    if(fresh){cache[sym]=cache[sym]||{};cache[sym].daily=fresh;renderAll();document.getElementById('go').disabled=false;return;}

    body.innerHTML='<div class="msg"><div class="spin"></div>Loading market data…</div>';
    fetchCandles(sym)
      .then(function(c){cache[sym]=cache[sym]||{};cache[sym].daily=c;lsSet('vp:daily:'+sym,c);renderAll();})
      .catch(function(e){
        var stale=lsGet('vp:daily:'+sym,0);
        if(stale){cache[sym]=cache[sym]||{};cache[sym].daily=stale;state.stale=true;renderAll();}
        else{var m=e&&e.rl?'Daily API limit reached — resets once per day.':(e&&e.msg&&e.msg.length>5?e.msg:'Network problem. Check your connection and retry.');body.innerHTML='<div class="err">'+m+'</div>';}
      })
      .finally(function(){document.getElementById('go').disabled=false;});
  }

  // lazily fetch extras (Twelve Data) only on user request
  function extraErr(cardId,title,e,retry){
    var el=document.getElementById(cardId);
    el.innerHTML='<div class="card"><div class="ctitle">'+title+'</div><div class="softerr">'+(e&&e.rl?'Daily API limit reached — resets once per day.':'Unavailable for this symbol.')+'</div><button id="'+cardId+'rt" class="loadbtn">Retry</button></div>';
    document.getElementById(cardId+'rt').onclick=retry;
  }
  function loadFundamentals(sym){
    document.getElementById('snapshot').innerHTML='<div class="card"><div class="ctitle">Company snapshot</div><div class="csub" style="margin-top:4px">Loading…</div></div>';
    // Sequential fetches — parallel concurrent requests cause CORS errors on Safari
    tdGet('profile','symbol='+encodeURIComponent(sym))
      .then(function(prof){return tdGet('statistics','symbol='+encodeURIComponent(sym)).then(function(stats){return {profile:prof,stats:stats};});})
      .then(function(o){return tdGet('cash_flow','symbol='+encodeURIComponent(sym)+'&period=annual&outputsize=4').then(function(cf){o.cashflow=cf;return o;}).catch(function(){return o;});})
      .then(function(o){cache[sym]=cache[sym]||{};cache[sym].overview=o;lsSet('vp:ov2:'+sym,o);if(state.symbol===sym)fillSnapshot();})
      .catch(function(e){extraErr('snapshot','Company snapshot',e,function(){loadFundamentals(sym);});});
  }
  function loadInsiders(sym){
    document.getElementById('insidercard').innerHTML='<div class="card"><div class="ctitle">Insider transactions</div><div class="csub" style="margin-top:4px">Loading…</div></div>';
    tdGet('insider_transactions','symbol='+encodeURIComponent(sym))
      .then(function(j){cache[sym]=cache[sym]||{};cache[sym].insiders=j;lsSet('vp:ins:'+sym,j);if(state.symbol===sym)fillInsiders();})
      .catch(function(e){extraErr('insidercard','Insider transactions',e,function(){loadInsiders(sym);});});
  }

  // ---------- render skeleton ----------
  function renderAll(){
    body.innerHTML=
      (state.stale?'<div class="card" style="border-color:rgba(251,191,36,.4)"><div class="stale" style="margin:0">⚠ Showing cached prices from an earlier session — live refresh hit today’s API limit (resets once per day).</div></div>':'')+
      '<div id="snapshot"></div>'+
      '<div id="entry"></div>'+
      '<div id="setup"></div>'+
      '<div id="chartcard" class="card"></div>'+
      '<div id="profilecard" class="card"></div>'+
      '<div id="insidercard" class="card"></div>';
    renderDaily(); fillSnapshot(); fillInsiders();
  }

  function renderDaily(){
    var sym=state.symbol, candles=cache[sym].daily, p=buildProfile(candles,state.lookback);
    if(!p){document.getElementById('entry').innerHTML='<div class="err">Not enough data to build a profile.</div>';return;}
    var fcloses=candles.map(function(c){return c.close;});
    var ind={rsi:rsi(fcloses,14),sma20:sma(fcloses,20),sma50:sma(fcloses,50),sma200:sma(fcloses,200),atr:atr(candles,14)};
    var lc=p.lastClose, distPoc=((lc-p.poc.mid)/p.poc.mid*100);

    // entry zone
    var rel=lc>p.vaHigh?{t:'Price is above the value area — POC may act as support on pullbacks.',c:'#34d399'}
      :lc<p.vaLow?{t:'Price is below the value area — POC may act as resistance on bounces.',c:'#fb7185'}
      :{t:'Price is inside the value area — fair-value zone; expect two-way trade.',c:'#cbd5e1'};
    var conf=[];
    if(ind.sma50&&Math.abs(p.poc.mid-ind.sma50)/p.poc.mid<0.02)conf.push('POC aligns with 50-day MA');
    if(ind.sma20&&Math.abs(p.poc.mid-ind.sma20)/p.poc.mid<0.02)conf.push('POC aligns with 20-day MA');
    document.getElementById('entry').innerHTML=
      '<div class="card kezc"><div class="kez"><span>◎ Key Entry Zone</span>'
      +'<span class="badge" style="background:rgba(16,185,129,.15);color:#34d399">● LIVE · TWELVE DATA</span></div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-top:14px">High Volume Node for <b style="color:#e2e8f0">'+sym+'</b> at</div>'
      +'<div class="poc">'+usd(p.poc.mid)+'</div>'
      +'<div style="font-size:11px;color:#64748b;margin-top:2px">Current price '+usd(lc)+' · '+(distPoc>=0?'+':'')+distPoc.toFixed(1)+'% vs POC</div>'
      +'<div class="divider"></div>'
      +'<div class="stats"><div><div class="l">Value Low</div><div class="v" style="color:#cbd5e1">'+usd(p.vaLow)+'</div></div>'
      +'<div><div class="l">Last Close</div><div class="v" style="color:'+POC+'">'+usd(lc)+'</div></div>'
      +'<div><div class="l">Value High</div><div class="v" style="color:#cbd5e1">'+usd(p.vaHigh)+'</div></div></div>'
      +'<div class="ind">'+indPill('RSI 14',ind.rsi!=null?ind.rsi.toFixed(0):'—',ind.rsi==null?'#94a3b8':ind.rsi>=70?'#fb7185':ind.rsi<=30?'#34d399':'#cbd5e1')
        +indPill('20D MA',ind.sma20?usd(ind.sma20):'—',ind.sma20&&lc>=ind.sma20?'#34d399':'#fb7185')
        +indPill('50D MA',ind.sma50?usd(ind.sma50):'—',ind.sma50&&lc>=ind.sma50?'#34d399':'#fb7185')
        +indPill('200D MA',ind.sma200?usd(ind.sma200):'—',ind.sma200&&lc>=ind.sma200?'#34d399':'#fb7185')
        +indPill('ATR 14',ind.atr?usd(ind.atr):'—','#cbd5e1')+'</div>'
      +'<div style="font-size:12px;color:'+rel.c+';margin-top:13px;line-height:1.5">'+rel.t+'</div>'
      +(conf.length?'<div style="font-size:11px;color:#2dd4bf;margin-top:6px">✓ '+conf.join(' · ')+'</div>':'')
      +'<div style="font-size:10px;color:#475569;margin-top:7px">Based on the last '+p.periodDays+' trading days of real market data.</div></div>';

    renderSetup(p,ind);
    renderChart(p);
    renderProfileBars(p);
  }

  function indPill(l,v,c){return '<span class="pill"><span style="color:#64748b;font-weight:400">'+l+'</span> <span style="color:'+c+'">'+v+'</span></span>';}

  // ---------- trade setup ----------
  function renderSetup(p,ind){
    var el=document.getElementById('setup');
    var hvnAbove=p.bins.filter(function(b){return b.isHVN&&b.mid>p.poc.mid;}).sort(function(a,b){return a.mid-b.mid;})[0];
    var entry=p.poc.mid, stop=p.vaLow, target=hvnAbove?hvnAbove.mid:p.vaHigh;
    if(!(target>entry&&entry>stop)){el.innerHTML='<div class="card"><div class="ctitle">Illustrative Long Setup</div><div class="csub">No clean long structure at current levels — POC sits at or above the value-area high.</div></div>';return;}
    var risk=entry-stop, reward=target-entry, rr=reward/risk;
    var atrTxt=ind.atr?(' · ≈'+(risk/ind.atr).toFixed(1)+'× ATR'):'';
    el.innerHTML='<div class="card"><div class="ctitle">Illustrative Long Setup <span style="font-weight:400;color:#64748b;font-size:11px">(educational)</span></div>'
      +'<div class="csub">Mean-reversion entry at the high-volume node, stop below value area, target the next volume shelf.</div>'
      +'<div class="grid2" style="grid-template-columns:repeat(4,1fr)">'
      +sm('Entry',usd(entry),'#cbd5e1')+sm('Stop',usd(stop),'#fb7185')+sm('Target',usd(target),'#34d399')+sm('R : R','1 : '+rr.toFixed(1),rr>=2?'#34d399':rr>=1?'#fbbf24':'#fb7185')+'</div>'
      +'<div style="font-size:10px;color:#475569;margin-top:9px">Risk '+usd(risk)+' / share'+atrTxt+'. Sizing &amp; suitability are your call.</div></div>';
  }
  function sm(l,v,c){return '<div class="metric"><div class="l">'+l+'</div><div class="v" style="color:'+c+'">'+v+'</div></div>';}

  // ---------- price chart (SVG) with level overlays ----------
  function renderChart(p){
    var W=340,H=180,padL=4,padR=84,padT=10,padB=16, w=p.window;
    var xs=W-padL-padR, ys=H-padT-padB;
    var lo=p.priceLow, hi=p.priceHigh, rng=hi-lo||1;
    function X(i){return padL+xs*(i/(w.length-1));}
    function Y(v){return padT+ys*(1-(v-lo)/rng);}
    var line=w.map(function(c,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(c.close).toFixed(1);}).join(' ');
    var area=line+' L'+X(w.length-1).toFixed(1)+' '+(padT+ys)+' L'+padL+' '+(padT+ys)+' Z';
    function hline(v,color,dash,label){var y=Y(v).toFixed(1);return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="'+color+'" stroke-width="1"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>'
      +'<text x="'+(W-padR+4)+'" y="'+(+y+3)+'" fill="'+color+'" font-size="9"><tspan font-weight="600">'+label+'</tspan> $'+v.toFixed(2)+'</text>';}
    var svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Price chart with volume profile levels">'
      +'<defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></linearGradient></defs>'
      +'<path d="'+area+'" fill="url(#pg)"/><path d="'+line+'" fill="none" stroke="#3b82f6" stroke-width="1.6"/>'
      +hline(p.poc.mid,POC,'',' POC')
      +hline(p.vaHigh,'#60a5fa','3 2',' VAH')
      +hline(p.vaLow,'#60a5fa','3 2',' VAL')
      +hline(p.lastClose,'#e2e8f0','1 2',' Now')
      +'</svg>';
    function leg(c,ab,name){return '<span><span class="sw" style="background:'+c+'"></span><b style="color:#cbd5e1;font-weight:600">'+ab+'</b>&nbsp;'+name+'</span>';}
    document.getElementById('chartcard').innerHTML='<div class="ctitle">'+state.symbol+' · Price vs Profile Levels</div>'
      +'<div class="csub">Closing price over the last '+p.periodDays+' sessions, with the volume-profile levels overlaid.</div>'+svg
      +'<div class="legend">'+leg(POC,'POC','Point of Control')+leg('#60a5fa','VAH','Value Area High')
      +leg('#60a5fa','VAL','Value Area Low')+leg('#e2e8f0','Now','Current price')+'</div>';
  }

  // ---------- horizontal volume bars ----------
  function renderProfileBars(p){
    var rows=p.bins.slice().reverse().map(function(b){
      var isP=b===p.poc, inVa=b.mid>=p.vaLow&&b.mid<=p.vaHigh, col=isP?POC:inVa?VA:OUT, pct=Math.max(2,(b.volume/p.maxVol)*100);
      var here=p.lastClose>=b.lower&&p.lastClose<b.upper;
      var tag=isP?'<span class="tag" style="color:'+POC+'">POC</span>':b.isHVN?'<span class="tag" style="color:'+HVN+'">HVN</span>':b.isLVN?'<span class="tag" style="color:'+LVN+'">LVN</span>':'<span class="tag"></span>';
      return '<div class="row"><div class="pl" style="color:'+(isP?POC:here?'#fff':'#64748b')+'">'+usd(b.mid)+'</div>'
        +'<div class="track"><div class="fill" style="width:'+pct+'%;background:'+col+'"></div>'
        +(here?'<div style="position:absolute;right:0;top:-3px;bottom:-3px;width:2px;background:#fff"></div>':'')+'</div>'+tag+'</div>';
    }).join('');
    document.getElementById('profilecard').innerHTML='<div class="ctitle">'+state.symbol+' · Volume by Price</div>'
      +'<div class="csub">Bars = volume traded at each level. White line marks current price.</div>'+rows
      +'<div class="legend"><span><span class="sw" style="background:'+POC+'"></span>POC</span>'
      +'<span><span class="sw" style="background:'+HVN+'"></span>High-vol node</span>'
      +'<span><span class="sw" style="background:'+LVN+'"></span>Low-vol node</span>'
      +'<span><span class="sw" style="background:'+VA+'"></span>Value area</span></div>';
  }

  // ---------- free cash flow renderer (called from renderSnapshot) ----------
  function fcfLabel(v){v=+v;if(!isFinite(v))return '—';var a=Math.abs(v);var s=a>=1e12?'$'+(a/1e12).toFixed(2)+'T':a>=1e9?'$'+(a/1e9).toFixed(1)+'B':a>=1e6?'$'+(a/1e6).toFixed(0)+'M':'$'+num(Math.round(a));return (v<0?'-':'')+s;}
  function renderFCF(o){
    // Try annual history first; fall back to TTM from statistics
    var annualRows=(o.cashflow&&o.cashflow.cash_flow)||[];
    var items=annualRows.filter(function(r){return r.free_cash_flow!=null&&isFinite(+r.free_cash_flow);}).slice(0,4);
    if(items.length>=2){
      var maxAbs=Math.max.apply(null,items.map(function(r){return Math.abs(+r.free_cash_flow);}));
      var bars=items.map(function(r){
        var v=+r.free_cash_flow, pos=v>=0, pct=maxAbs>0?Math.max(4,Math.round(Math.abs(v)/maxAbs*100)):4;
        var yr=(r.fiscal_date||'').slice(0,4);
        return '<div style="flex:1;min-width:0">'
          +'<div style="font-size:9px;color:#64748b;text-align:center;margin-bottom:4px">'+yr+'</div>'
          +'<div style="height:44px;display:flex;align-items:flex-end;justify-content:center">'
          +'<div style="width:28px;height:'+pct+'%;min-height:4px;border-radius:3px 3px 0 0;background:'+(pos?'#22c55e':'#fb7185')+'"></div></div>'
          +'<div style="font-size:9px;font-weight:600;color:'+(pos?'#22c55e':'#fb7185')+';text-align:center;margin-top:3px">'+fcfLabel(v)+'</div>'
          +'</div>';
      }).join('');
      return '<div style="margin-top:14px"><div style="font-size:9px;letter-spacing:.06em;color:#64748b;text-transform:uppercase;margin-bottom:6px">Free Cash Flow (Annual)</div>'
        +'<div style="display:flex;gap:6px;align-items:flex-end">'+bars+'</div></div>';
    }
    // TTM fallback from statistics endpoint
    var ss=o.stats&&o.stats.statistics&&o.stats.statistics.stock_statistics;
    var ttm=ss&&(ss.levered_free_cash_flow_ttm||ss.free_cash_flow_ttm);
    if(ttm==null||!isFinite(+ttm))return '';
    var v=+ttm, pos=v>=0;
    return '<div style="margin-top:14px"><div style="font-size:9px;letter-spacing:.06em;color:#64748b;text-transform:uppercase;margin-bottom:4px">Free Cash Flow (TTM)</div>'
      +'<div style="font-size:18px;font-weight:600;color:'+(pos?'#22c55e':'#fb7185')+'">'+fcfLabel(v)+'</div></div>';
  }

  // ---------- fundamentals snapshot ----------
  function fillSnapshot(){
    var el=document.getElementById('snapshot'); if(!el)return; var sym=state.symbol;
    var o=(cache[sym]&&cache[sym].overview)||lsGet('vp:ov2:'+sym,7*DAY);
    if(o){cache[sym]=cache[sym]||{};cache[sym].overview=o;renderSnapshot(el,sym,o);return;}
    el.innerHTML='<div class="card"><div class="ctitle">Company snapshot</div><div class="csub" style="margin-top:4px">Sector, market cap, P/E &amp; 52-week range.</div>'
      +'<button id="loadov" class="loadbtn">Load fundamentals</button></div>';
    document.getElementById('loadov').onclick=function(){loadFundamentals(sym);};
  }
  function renderSnapshot(el,sym,o){
    var prof=o.profile||{}, vm=(o.stats&&o.stats.statistics&&o.stats.statistics.valuations_metrics)||{};
    var candles=cache[sym].daily, lc=candles.slice(-1)[0].close;
    var yr=candles.slice(-252), lo=Math.min.apply(null,yr.map(function(c){return c.low;})), hi=Math.max.apply(null,yr.map(function(c){return c.high;}));
    var pos=hi>lo?Math.max(0,Math.min(100,(lc-lo)/(hi-lo)*100)):null;
    function pe(v){return v&&isFinite(+v)?(+v).toFixed(1):'—';}
    el.innerHTML='<div class="card"><div><div style="font-size:16px;font-weight:600;color:#fff">'+(prof.name||sym)+'</div>'
      +'<div style="font-size:11px;color:#64748b;margin-top:2px">'+[prof.exchange,prof.sector,prof.industry].filter(Boolean).join(' · ')+'</div></div>'
      +'<div class="grid2" style="grid-template-columns:repeat(4,1fr);margin-top:13px">'
      +sm('Mkt Cap',cap(vm.market_capitalization),'#e2e8f0')+sm('P/E',pe(vm.trailing_pe),'#e2e8f0')
      +sm('Fwd P/E',pe(vm.forward_pe),'#e2e8f0')+sm('P/B',pe(vm.price_to_book_mrq),'#e2e8f0')+'</div>'
      +(pos!=null?'<div style="margin-top:14px"><div style="font-size:9px;letter-spacing:.06em;color:#64748b;text-transform:uppercase">52-week range</div>'
        +'<div class="rng"><div class="rngmark" style="left:calc('+pos.toFixed(1)+'% - 1.5px)"></div></div>'
        +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8"><span>'+usd(lo)+'</span><span style="color:#fff">'+usd(lc)+'</span><span>'+usd(hi)+'</span></div></div>':'')
      +renderFCF(o)
      +'</div>';
  }

  // ---------- insider transactions ----------
  function titleCase(s){return (s||'').toLowerCase().replace(/\b([a-z])/g,function(m){return m.toUpperCase();});}
  function insDir(t){return /purchas|buy|bought|acqui/i.test(t.description||'')?1:/sale|sold|sell|dispos/i.test(t.description||'')?-1:(+t.value<0?-1:1);}
  function insPrice(t){var m=/([\d.]+)\s*per share/i.exec(t.description||'');return m?+m[1]:0;}
  function fillInsiders(){
    var el=document.getElementById('insidercard'); if(!el)return; var sym=state.symbol;
    var n=(cache[sym]&&cache[sym].insiders)||lsGet('vp:ins:'+sym,1*DAY);
    if(!n){el.innerHTML='<div class="ctitle">Insider transactions</div><div class="csub" style="margin-top:4px">Recent buys &amp; sells by company executives.</div>'
      +'<button id="loadins" class="loadbtn">Load insider trades</button></div>';
      document.getElementById('loadins').onclick=function(){loadInsiders(sym);};return;}
    cache[sym]=cache[sym]||{};cache[sym].insiders=n;
    var data=(n.insider_transactions||[]);
    if(!data.length){el.innerHTML='<div class="ctitle">Insider transactions</div><div class="softerr">No recent insider filings.</div>';return;}
    var stat=data.slice(0,40), buys=0, sells=0, bsh=0, ssh=0;
    stat.forEach(function(t){var sh=Math.abs(+t.shares||0); if(insDir(t)>0){buys++;bsh+=sh;}else{sells++;ssh+=sh;}});
    var net=bsh-ssh, lab=net>0?{t:'Net buying',c:'#34d399'}:net<0?{t:'Net selling',c:'#fb7185'}:{t:'Balanced',c:'#cbd5e1'};
    var rows=data.slice(0,8).map(function(t){
      var buy=insDir(t)>0, sh=Math.round(Math.abs(+t.shares||0)), pr=insPrice(t);
      return '<div class="newsitem" style="display:flex;justify-content:space-between;gap:10px;align-items:center;cursor:default">'
        +'<div style="min-width:0"><div class="newshead" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+titleCase(t.full_name)+'</div>'
        +'<div class="newsmeta"><span>'+(t.position||'—')+'</span><span>'+(t.date_reported||'')+'</span></div></div>'
        +'<div style="text-align:right;white-space:nowrap"><div style="font-size:12px;font-weight:600;color:'+(buy?'#34d399':'#fb7185')+'">'+(buy?'BUY':'SELL')+'</div>'
        +'<div style="font-size:10px;color:#94a3b8">'+num(sh)+' sh'+(pr>0?' @ $'+pr.toFixed(2):'')+'</div></div></div>';
    }).join('');
    el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><div class="ctitle">Insider transactions</div>'
      +'<span class="badge" style="background:rgba(255,255,255,.06);color:'+lab.c+'">'+lab.t+'</span></div>'
      +'<div class="csub">Recent filings · '+buys+' buys / '+sells+' sells · net '+(net>=0?'+':'')+num(net)+' sh (last '+stat.length+').</div>'+rows;
  }

  document.getElementById('go').onclick=analyze;
  document.getElementById('ticker').addEventListener('keydown',function(e){if(e.key==='Enter')analyze();});
  document.getElementById('lbg').addEventListener('click',function(e){
    var btn=e.target.closest('button'); if(!btn)return;
    state.lookback=+btn.getAttribute('data-d');
    Array.prototype.forEach.call(this.children,function(b){b.className=b===btn?'on':'';});
    if(state.symbol&&cache[state.symbol]&&cache[state.symbol].daily)renderDaily();
  });

  analyze();
})();
</script>
</body>
</html>
